name: SF Apartment Scanner

on:
  schedule:
    # Runs every 3 hours around the clock
    - cron: "0 */3 * * *"
  workflow_dispatch:  # Allow manual runs from the GitHub Actions UI

jobs:
  scan:
    name: Run Apartment Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      SMTP_EMAIL:          ${{ secrets.SMTP_EMAIL }}
      SMTP_PASSWORD:       ${{ secrets.SMTP_PASSWORD }}
      GIST_TOKEN:          ${{ secrets.GIST_TOKEN }}
      GIST_ID:             ${{ secrets.GIST_ID }}
      NOTIFICATION_EMAIL:  ${{ secrets.NOTIFICATION_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner pipeline
        run: python main.py

      - name: Log run summary
        if: always()
        run: echo "Pipeline run completed at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
