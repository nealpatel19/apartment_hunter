name: SF Apartment Scanner

on:
  schedule:
    # Runs 4x daily at 9:00 AM, 5:00 PM, 10:00 PM, and 1:00 AM Eastern Time
    # Eastern EDT (UTC-4): 9AM=13:00 UTC, 5PM=21:00 UTC, 10PM=02:00 UTC, 1AM=05:00 UTC
    - cron: "0 13,21,2,5 * * *"
  workflow_dispatch:  # Allow manual runs from the GitHub Actions UI

jobs:
  scan:
    name: Run Apartment Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      SMTP_EMAIL:          ${{ secrets.SMTP_EMAIL }}
      SMTP_PASSWORD:       ${{ secrets.SMTP_PASSWORD }}
      GIST_TOKEN:          ${{ secrets.GIST_TOKEN }}
      GIST_ID:             ${{ secrets.GIST_ID }}
      NOTIFICATION_EMAIL:  ${{ secrets.NOTIFICATION_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner pipeline
        run: python main.py

      - name: Log run summary
        if: always()
        run: echo "Pipeline run completed at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
